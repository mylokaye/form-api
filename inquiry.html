<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"><html><head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Inquiry</title>
    <meta name="referrer" content="never">
    <meta type="xrm/designer/setting" name="type" value="marketing-designer-content-editor-document">
    <meta type="xrm/designer/setting" name="layout-editable" value="marketing-designer-layout-editable">


</head>

<body>
    <style>
        /* ===========================================================
           STYLES INDEX
           1.  Feedback / confirmation icon
           2.  Global box-model reset
           3.  Typography  (headings, paragraphs, links, lists)
           4.  Buttons     (primary, secondary, error)
           5.  Zero-state container
           6.  Base form styles & layout container
           7.  Editor block-type overrides (Submit, Captcha, etc.)
           8.  Form field block layout
           9.  Field labels
           10. Required-field indicators (asterisk via ::after)
           11. Input / select / textarea styles
           12. Radio button & checkbox option groups
           13. Event sessions
           14. RTL (right-to-left) language support
           15. Rich-text decorators (strikethrough, underline, etc.)
           16. Responsive / mobile (@media max-width: 768px)
           17. Notification / alert banners
           18. Phone field styles
           19. Subtitle / helper text & required suffix
           20. Validation states (invalid highlight, focus ring)
           21. Accordion component
           =========================================================== */

        /* -----------------------------------------------------------
           1. FEEDBACK / CONFIRMATION ICON
           Displayed after successful form submission.
           ----------------------------------------------------------- */
        .onFormSubmittedFeedbackIcon {
            content: url("https://raw.githubusercontent.com/nor-git-ship-it/forms/refs/heads/main/tick.png");
            height: auto !important;
            size: auto !important;
            padding: 30px 0px 30px 1px;
            margin: auto;
            background-position: center;
            background-size: 50px 50px;
        }


        /* -----------------------------------------------------------
           2. GLOBAL BOX-MODEL RESET
           Ensures consistent box-sizing across all elements inside
           the editor layout container.
           ----------------------------------------------------------- */
        .editor-control-layout html {
            box-sizing: border-box;
            background-color: rgb(255, 255, 255);
        }

        .editor-control-layout *,
        .editor-control-layout ::before,
        .editor-control-layout ::after {
            box-sizing: inherit;
        }

        /* -----------------------------------------------------------
           3. TYPOGRAPHY — HEADINGS, PARAGRAPHS, LINKS & LISTS
           Sets font family, size, colour and alignment for all text
           elements rendered inside .marketingForm.
           ----------------------------------------------------------- */
        .marketingForm h1 {
            color: rgb(0, 0, 0);
            margin: 0px;
            padding: 0px;
            width: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            line-height: 1.25;
            font-size: 28px;
            text-align: center;
        }

        .marketingForm h2 {
            color: rgb(51, 51, 51);
            margin: 0px;
            padding: 0px;
            width: 100%;
            line-height: 1.25;
            font-family: Arial, Verdana, sans-serif;
            font-size: 22px;
            text-align: center;
            font-weight: normal;
            font-style: normal;
            text-decoration: none;
        }

        .marketingForm h3 {
            color: rgb(0, 0, 0);
            margin: 0px;
            padding: 0px;
            width: 100%;
            line-height: 1.25;
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 18px;
            text-align: center;
        }

        .marketingForm p {
            margin: 0px;
            padding: 0px;
            line-height: 1.25;
            font-family: Arial, Verdana, sans-serif;
            font-size: 14px;
            text-align: center;
        }

        .marketingForm a,
        div[data-editorblocktype="Captcha"] td:nth-of-type(2) a {
            text-decoration: none;
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 14px;
        }

        /* -----------------------------------------------------------
           4. BUTTONS — PRIMARY / SUBMIT, SECONDARY & ERROR TEXT
           Covers the main submit button, an optional secondary action
           button, and inline validation error messages.
           ----------------------------------------------------------- */
        .marketingForm .primaryButtonWrapper,
        .submitButtonWrapper {
            text-align: center;
            margin: 10px 0px;
        }

        .marketingForm .primaryButton,
        .submitButton {
            font-family: "Segoe UI", Arial, sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 22px;
            background-color: rgb(34, 102, 227);
            border: none;
            border-radius: 4px;
            color: rgb(255, 255, 255);
            padding: 10px 20px;
            cursor: pointer;
        }

        .marketingForm .secondaryButton {
            font-family: "Segoe UI", Arial, sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 22px;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(0, 130, 221);
            border-radius: 4px;
            color: rgb(34, 102, 227);
            padding: 10px 20px;
            margin: 0px;
            cursor: pointer;
        }

        .marketingForm .error {
            font-family: Arial, Verdana, sans-serif;
            font-weight: bold;
            font-size: 8px;
            margin: 0px;
            padding: 0px;
            color: rgb(168, 0, 0);
        }

        /* -----------------------------------------------------------
           5. ZERO-STATE CONTAINER
           Shown when the form has no fields to display (designer
           preview mode).
           ----------------------------------------------------------- */
        .zero-state-container span {
            font-family: "Segoe UI", Arial, sans-serif;
            font-weight: 600;
            font-size: 20px;
            line-height: 26px;
            color: rgb(36, 36, 36);
        }

        /* -----------------------------------------------------------
           6. BASE FORM STYLES & LAYOUT CONTAINER
           Sets the root font and constrains the form to a max-width
           of 700 px centred on the page.
           ----------------------------------------------------------- */
        form.marketingForm {
            color: rgb(0, 0, 0);
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 14px;
        }

        [data-layout="true"] {
            margin: 0px auto;
            max-width: 700px;
            background-color: rgb(255, 255, 255);
        }

        /* -----------------------------------------------------------
           7. EDITOR BLOCK-TYPE OVERRIDES
           Padding and layout tweaks specific to CRM designer block
           types: SubmitButton, Captcha, About, Sessions, Speakers.
           ----------------------------------------------------------- */
        div[data-editorblocktype="SubmitButton"] {
            padding: 20px 0px;
        }

        div[data-editorblocktype="Captcha"] {
            padding: 20px 12%;
        }

        div[data-editorblocktype="Captcha"] table,
        div[data-editorblocktype="Captcha"] div>table>tbody>tr>td:nth-of-type(2) {
            width: 100% !important;
        }

        div[data-editorblocktype="Captcha"] div>div>table>tbody>tr:first-of-type>td:last-of-type {
            padding-bottom: 12px !important;
        }

        div[data-editorblocktype="Captcha"] tr[id="wlspispHIPErrorContainer"] {
            margin-top: 20px;
        }

        div[data-editorblocktype="Captcha"] tr[id="wlspispHIPErrorContainer"] td:nth-of-type(2) {
            width: auto !important;
        }

        div[data-editorblocktype="Captcha"] tr[id="wlspispHIPErrorContainer"] img {
            display: flex;
        }

        div[data-editorblocktype="Captcha"] td:nth-of-type(2)>div>div {
            margin-top: 4px;
        }

        div[data-editorblocktype="Captcha"] td:nth-of-type(2)>div>div * {
            font-weight: 400;
        }

        div[data-editorblocktype="Captcha"] td:nth-of-type(2)>div>div b {
            color: rgb(121, 119, 117);
        }

        div[data-editorblocktype="Captcha"] tr:nth-of-type(2)>td {
            height: 0px !important;
        }

        div[data-editorblocktype="Captcha"] td input {
            margin-top: 20px !important;
            padding: 6px 8px !important;
            width: 100% !important;
        }

        div[data-editorblocktype="Captcha"] div[id^="wlspaudioBtnHolder"] {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        div[data-editorblocktype="About"],
        div[data-editorblocktype="Sessions"],
        div[data-editorblocktype="Speakers"] {
            padding: 32px 24px;
        }

        div[data-editorblocktype="Sessions"] h2 {
            margin-bottom: 32px;
            text-align: center;
        }

        /* -----------------------------------------------------------
           8. FORM FIELD BLOCK LAYOUT
           Controls the flex column layout, padding and gap for every
           field type: text, date-time, option-set, lookup, passes,
           multi-option-set and two-option (checkbox/radio).
           Table-based multi-column variants get extra horizontal
           padding.
           ----------------------------------------------------------- */
        .textFormFieldBlock,
        .dateTimeFormFieldBlock,
        .twoOptionFormFieldBlock,
        .optionSetFormFieldBlock,
        .passesBlock,
        .multiOptionSetFormFieldBlock,
        .lookupFormFieldBlock {
            padding: 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        table.multi .textFormFieldBlock,
        table.multi .dateTimeFormFieldBlock,
        table.multi .twoOptionFormFieldBlock,
        table.multi .optionSetFormFieldBlock,
        table.multi .passesBlock,
        table.multi .multiOptionSetFormFieldBlock,
        table.multi .lookupFormFieldBlock {
            padding: 12px 20px;
        }

        .consentBlock {
            padding: 4px 30px;
        }

        /* -----------------------------------------------------------
           9. FIELD LABELS
           Font, colour and display rules for every visible label
           element across all field-block types.
           Note: the commented-out block below was an earlier attempt
           at floating labels and is intentionally left for reference.
           ----------------------------------------------------------- */
        .textFormFieldBlock label,
        .dateTimeFormFieldBlock label,
        .lookupFormFieldBlock label,
        .twoOptionFormFieldBlock label.block-label,
        .optionSetFormFieldBlock label.block-label,
        .multiOptionSetFormFieldBlock label.block-label,
        div[data-editorblocktype="Captcha"] label[id^="wlspispHipInstructionContainer"],
        .textFormFieldBlock label *,
        .dateTimeFormFieldBlock label *,
        .lookupFormFieldBlock label *,
        .twoOptionFormFieldBlock label.block-label *,
        .optionSetFormFieldBlock label.block-label *,
        .multiOptionSetFormFieldBlock label.block-label *,
        .consentBlock label p,
        .passesBlock label {
            font-family: Arial, Verdana, sans-serif;
            font-size: 14px;
            font-weight: normal;
            color: rgb(50, 49, 48);
            font-style: normal;
            text-decoration: none;






        }

        .textFormFieldBlock label,
        .dateTimeFormFieldBlock label,
        .lookupFormFieldBlock label,
        .twoOptionFormFieldBlock label.block-label,
        .optionSetFormFieldBlock label.block-label,
        .multiOptionSetFormFieldBlock label.block-label,
        .passesBlock label,
        div[data-editorblocktype="Captcha"] label[id^="wlspispHipInstructionContainer"] {
            display: inline-block;
            margin: 0px;
            padding: 0px;
            width: 100%;
            text-align: left;
            font-size: 14px;

            /*
            margin-bottom:-35px;
            
             z-index:1;
             position:relative;
             padding:0px 10px 0 20px;
             pointer-events:none;
*/

        }



        .textFormFieldBlock label>*,
        .dateTimeFormFieldBlock label>*,
        .lookupFormFieldBlock label>*,
        .twoOptionFormFieldBlock label.block-label>*,
        .optionSetFormFieldBlock label.block-label>*,
        .multiOptionSetFormFieldBlock label.block-label>*,
        .passesBlock label.block-label>*,
        .consentBlock label>* {
            display: inline-block;
        }

        /* -----------------------------------------------------------
           10. REQUIRED-FIELD INDICATORS
           An asterisk (*) pseudo-element is appended to every label.
           It is hidden by default and made visible when the parent
           field block carries [data-required].
           ----------------------------------------------------------- */
        .textFormFieldBlock label::after,
        .twooption_checkbox label::after,
        .dateTimeFormFieldBlock label::after,
        .lookupFormFieldBlock label::after,
        .twoOptionFormFieldBlock label.block-label::after,
        .twoOptionFormFieldBlock div.twooption_checkbox label::after,
        .optionSetFormFieldBlock label.block-label::after,
        .passesBlock label.block-label::after,
        .multiOptionSetFormFieldBlock label.block-label::after,
        .consentBlock label::after,
        .eventSession label::after,
        div[data-editorblocktype="Sessions"] h2::after,
        div[data-editorblocktype="Captcha"] label[id^="wlspispHipInstructionContainer"]::after {
            width: 22px;
            display: inline-block;
            line-height: 22px;
            text-align: center;
            color: rgb(255, 255, 255);
            content: "*";
            visibility: hidden;
        }

        div[data-required].textFormFieldBlock label::after,
        div[data-required].dateTimeFormFieldBlock label::after,
        div[data-required].lookupFormFieldBlock label::after,
        div[data-required] div.twooption_checkbox label::after,
        div[data-required] label.block-label::after,
        div[data-required="true"].consentBlock label::after,
        div[data-editorblocktype="Sessions"][data-required="true"i] h2::after,
        div[data-editorblocktype="Captcha"] label[id^="wlspispHipInstructionContainer"]::after {
            visibility: visible;
        }

        .eventSessions div.eventSession div input[type="checkbox"]:checked+label::after,
        .eventSessions div.eventSession div input[type="radio"]:checked+label::after {
            visibility: visible;
        }

        /* -----------------------------------------------------------
           11. INPUT / SELECT / TEXTAREA STYLES
           Unified appearance for all interactive controls: border,
           border-radius, padding, full-width block display, and
           SVG background icons for dropdown arrows and the lookup
           search icon.
           ----------------------------------------------------------- */
        .optionSetFormFieldBlock select,
        .textFormFieldBlock input,
        .dateTimeFormFieldBlock input,
        .lookupFormFieldBlock input,
        .marketingForm textarea,
        div[data-editorblocktype="Captcha"] input,
        .passesBlock select {
            font-family: Arial, Verdana, sans-serif;
            padding: 18px 20px;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(128, 128, 128);
            border-radius: 10px;
            display: block;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            font-size: 14px;
            flex: 2 1 20%;
            color: rgb(0, 0, 0);
        }

        .optionSetFormFieldBlock select,
        .textFormFieldBlock input::placeholder,
        .dateTimeFormFieldBlock input,
        .lookupFormFieldBlock input::placeholder,
        .marketingForm textarea::placeholder,
        .passesBlock select,
        div[data-editorblocktype="Captcha"] input::placeholder {
             color: darkgrey;
        }

        .textFormFieldBlock textarea {
            resize: vertical;
            height: 120px;
        }

        .lookupFormFieldBlock input {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDQ4IDIwNDgiPjxwYXRoIGQ9Ik0xMzQ0IDBxOTcgMCAxODcgMjV0MTY4IDcxIDE0MiAxMTAgMTExIDE0MyA3MSAxNjggMjUgMTg3cTAgOTctMjUgMTg3dC03MSAxNjgtMTEwIDE0Mi0xNDMgMTExLTE2OCA3MS0xODcgMjVxLTEyNSAwLTIzOS00MnQtMjExLTEyMWwtNzg1IDc4NHEtMTkgMTktNDUgMTl0LTQ1LTE5LTE5LTQ1cTAtMjYgMTktNDVsNzg0LTc4NXEtNzktOTYtMTIxLTIxMHQtNDItMjQwcTAtOTcgMjUtMTg3dDcxLTE2OCAxMTAtMTQyVDk4OSA5NnQxNjgtNzEgMTg3LTI1em0wIDEyODBxMTE5IDAgMjI0LTQ1dDE4My0xMjQgMTIzLTE4MyA0Ni0yMjRxMC0xMTktNDUtMjI0dC0xMjQtMTgzLTE4My0xMjMtMjI0LTQ2cS0xMTkgMC0yMjQgNDVUOTM3IDI5NyA4MTQgNDgwdC00NiAyMjRxMCAxMTkgNDUgMjI0dDEyNCAxODMgMTgzIDEyMyAyMjQgNDZ6Ii8+PC9zdmc+");
            background-repeat: no-repeat;
            background-position: 98% center;
            background-size: 1em 1em;
        }

        .lookupFormFieldBlock input:dir(rtl) {
            background-position-x: 2%;
        }

        .optionSetFormFieldBlock select,
        .passesBlock select {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIiIGhlaWdodD0iNyIgdmlld0JveD0iMCAwIDEyIDciIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxwYXRoIGQ9Ik02IDYuNzA4OThMMC4xNDY0ODQgMC44NTU0NjlMMC44NTU0NjkgMC4xNDY0ODRMNiA1LjI5MTAyTDExLjE0NDUgMC4xNDY0ODRMMTEuODUzNSAwLjg1NTQ2OUw2IDYuNzA4OThaIiBmaWxsPSIjNjA1RTVDIi8+Cjwvc3ZnPgo=");
            background-repeat: no-repeat;
            background-position: 98% center;
            appearance: none;
        }

        .optionSetFormFieldBlock select option,
        .passesBlock select option {
            background-color: rgb(255, 255, 255);
        }

        /* -----------------------------------------------------------
           12. RADIO BUTTON & CHECKBOX OPTION GROUPS
           Flex layout for twoOption, optionSet and multiOptionSet
           inputs plus their labels. Includes checked-state colours
           and custom accent colour for checkboxes/radio inputs.
           ----------------------------------------------------------- */
        .twoOptionFormFieldBlock div.radiobuttons,
        .twoOptionFormFieldBlock div.twooption_checkbox,
        .optionSetFormFieldBlock div.radiobuttons,
        .multiOptionSetFormFieldBlock fieldset {
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0px;
            gap: 8px;
            flex: 2 1 0%;
        }

        .twoOptionFormFieldBlock div.radiobuttons,
        .optionSetFormFieldBlock div.radiobuttons,
        .multiOptionSetFormFieldBlock fieldset {
            margin-top: 14px;
        }

        .twoOptionFormFieldBlock div.radiobuttons>div,
        .twoOptionFormFieldBlock div.twooption_checkbox>div,
        .optionSetFormFieldBlock div.radiobuttons>div,
        .multiOptionSetFormFieldBlock fieldset>div,
        .consentBlock>div {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            gap: 8px;
        }

        .twoOptionFormFieldBlock div.radiobuttons div label,
        .optionSetFormFieldBlock div.radiobuttons div label {
            font-family: Arial, Verdana, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 20px;
        }

        .twoOptionFormFieldBlock div.twooption_checkbox div label,
        .twoOptionFormFieldBlock div.twooption_checkbox div label div,
        .consentBlock div label p {
            font-family: Arial, Verdana, sans-serif;
            font-size: 16px;
            font-weight: normal;
            line-height: 20px;
            font-style: normal;
            text-decoration: none;
        }

        .eventSessions div.eventSession div label,
        .eventSessions div.eventSession div label div {
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            line-height: 20px;
        }

        .multiOptionSetFormFieldBlock fieldset>div>label {
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
        }

        .optionSetFormFieldBlock div.radiobuttons div input[type="radio"]:checked+label,
        .twoOptionFormFieldBlock div.radiobuttons div input[type="radio"]:checked+label {
            color: inherit;
        }

        .twoOptionFormFieldBlock div.twooption_checkbox div input[type="checkbox"]:checked+label,
        .twoOptionFormFieldBlock div.twooption_checkbox div input[type="checkbox"]:checked+label div,
        .consentBlock div input[type="checkbox"]:checked+label p {
            color: inherit;
        }

        .eventSessions div.eventSession div input[type="checkbox"]:checked+label,
        .eventSessions div.eventSession div input[type="checkbox"]:checked+label div,
        .eventSessions div.eventSession div input[type="radio"]:checked+label,
        .eventSessions div.eventSession div input[type="radio"]:checked+label div {
            text-decoration: none;
            font-weight: 400;
            color: rgb(0, 0, 0);
        }

        .twoOptionFormFieldBlock div.radiobuttons,
        .optionSetFormFieldBlock div.radiobuttons {
            padding: 0px;
            margin: 0px;
            border-radius: 1px;
            background-color: transparent;
        }

        .twoOptionFormFieldBlock div.twooption_checkbox>div,
        .consentBlock>div {
            width: 100%;
            border-radius: 1%;
            background-color: rgb(255, 255, 255);
        }

        .eventSessions div.eventSession>div {
            width: 100%;
            border-radius: 0px;
            background-color: transparent;
        }

        .twoOptionFormFieldBlock div.radiobuttons div,
        .optionSetFormFieldBlock div.radiobuttons div {
            width: 100%;
        }

        .twoOptionFormFieldBlock div.twooption_checkbox div,
        .consentBlock div {
            padding: 0px;
            margin: 0px;
        }

        .eventSessions div.eventSession div {
            padding: 0px;
            margin: 0px;
        }

        div[data-editorblocktype="Sessions"] .eventSessions div.eventSession {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
        }

        .eventSessions div.eventSession div.eventSessionDescription>p:not(:first-child) {
            font-size: 12px;
            margin-top: 4px;
        }

        .eventSessions div.eventSession div.eventSessionDescription p .sessionFullMessage {
            color: rgb(191, 0, 119);
        }

        .eventSessions div.eventSession div.eventSessionDescription p .sessionWaitlistMessage {
            color: rgb(112, 112, 112);
        }

        .eventSessions div.eventSession:not(:last-child) {
            margin-bottom: 14px;
        }

        .eventSessions div.eventSession div.eventSessionInput {
            flex: 0 1 0%;
        }

        .eventSessions div.eventSession div.eventSessionDescription {
            flex: 1 1 0%;
        }

        .twoOptionFormFieldBlock div.radiobuttons div input,
        .twoOptionFormFieldBlock div.twooption_checkbox div input,
        .optionSetFormFieldBlock div.radiobuttons div input,
        .multiOptionSetFormFieldBlock fieldset>div>input[type="checkbox"],
        .eventSession>div>input[type="checkbox"],
        .eventSession>div>input[type="radio"],
        .consentBlock div input {
            margin: 0px;
            box-sizing: border-box;
            width: 20px;
            height: 20px;
            border: 1px solid rgb(50, 49, 48);
            border-radius: 2px;
            accent-color: rgb(0, 120, 212);
            flex-shrink: 0;
        }

        /* -----------------------------------------------------------
           13. EVENT SESSIONS
           Layout and typography for selectable event session rows
           within a Sessions block, including full/waitlist status
           messages.
           ----------------------------------------------------------- */
        .eventSessions {
            font-size: 14px;
            line-height: 1.2;
            border: none;
        }

        .eventSession label b {
            display: inline;
        }

        /* -----------------------------------------------------------
           14. RTL (RIGHT-TO-LEFT) LANGUAGE SUPPORT
           Flips text alignment and column-header alignment for
           languages such as Arabic or Hebrew.
           ----------------------------------------------------------- */
        .marketingForm [dir="rtl"],
        .marketingForm [dir="rtl"] * {
            text-align: right;
        }

        /* -----------------------------------------------------------
           15. RICH-TEXT DECORATORS
           Ensures strikethrough (< s>) and underline (< u>) wrapper
           elements correctly pass decoration to their inner < span>
           children, and that images don't overflow their container.
           ----------------------------------------------------------- */
        .marketingForm s span {
            text-decoration: line-through;
        }

        .marketingForm u span {
            text-decoration: underline;
        }

        .dividerWrapper p span {
            line-height: 0px;
        }

        .marketingForm li {
            font-family: Arial, Verdana, sans-serif;
            font-size: 14px;
            color: rgb(0, 0, 0);
            line-height: inherit;
            font-weight: normal;
            text-align: left;
        }

        .marketingForm ul,
        .marketingForm ol {
            margin-top: 15px;
            margin-bottom: 15px;
            line-height: 1.25;
            padding-inline-end: 0px !important;
        }

        .marketingForm p img {
            max-width: 100%;
        }

        .marketingForm u a {
            text-decoration: underline;
        }

        .marketingForm .imageWrapper a img {
            text-decoration: none;
            border: 0px;
        }

        .marketingForm th.columnContainer,

    <!-- ============================================================
         Name: Shared Console Logging
         Purpose: Provides one styled logger factory for all inline scripts
         so console output uses consistent badges and each log shows the
         script name.
         Source: Inline helper script maintained directly in inquiry.html.
         ============================================================ -->
    <script>
        (function () {
            const LOG_STYLES = {
                info: 'background:#16a34a;color:#fff;padding:3px 6px;border-radius:3px;font-weight:700;',
                success: 'background:#16a34a;color:#fff;padding:3px 6px;border-radius:3px;font-weight:700;',
                warn: 'background:#dc2626;color:#fff;padding:3px 6px;border-radius:3px;font-weight:700;',
                error: 'background:#dc2626;color:#fff;padding:3px 6px;border-radius:3px;font-weight:700;',
                debug: 'background:#dc2626;color:#fff;padding:3px 6px;border-radius:3px;font-weight:700;'
            };

            window.FORM_LOG_STYLES = LOG_STYLES;
            window.createFormLogger = function createFormLogger(scriptName) {
                return {
                    info: (...args) => console.info(`%c[${scriptName}]`, LOG_STYLES.info, ...args),
                    success: (...args) => console.log(`%c[${scriptName}]`, LOG_STYLES.success, ...args),
                    warn: (...args) => console.warn(`%c[${scriptName}]`, LOG_STYLES.warn, ...args),
                    error: (...args) => console.error(`%c[${scriptName}]`, LOG_STYLES.error, ...args),
                    debug: (...args) => console.debug(`%c[${scriptName}]`, LOG_STYLES.debug, ...args)
                };
            };

    <!-- ============================================================
         Name: Lead-Native Form Validation
         Purpose: Adds page-level validation for required fields before
         the marketing platform handles submission.
         Source: Inline helper script maintained directly in inquiry.html.
         ============================================================ -->
    <script>
        (function () {
            const logger = window.createFormLogger('Lead-Native Form Validation');

            /* Locate the marketing form; bail out if not found. */
            const form = document.querySelector('form.marketingForm');

            if (!form) {
                return;
            }

            /* Collect all required controls once for reuse. */
            const requiredControls = Array.from(form.querySelectorAll('input[required], textarea[required], select[required]'));
            /* Track whether the user has attempted to submit at least once. */
            let hasSubmitted = false;

            /* Auto-focus the first visible, enabled control on page load. */
            const firstFocusableControl = form.querySelector('input:not([type="hidden"]):not([disabled]), textarea:not([disabled]), select:not([disabled])');

            if (firstFocusableControl) {
                requestAnimationFrame(function () {
                    firstFocusableControl.focus();
                });
            }

            /* Listen for native 'invalid' events (fired per-field by the
               browser when a required control fails constraint validation). */
            form.addEventListener('invalid', function (event) {
                hasSubmitted = true;
                const control = event.target;

                logger.info('Field invalid', {
                    field: control ? (control.name || control.id || 'unknown') : 'unknown',
                    message: control && typeof control.validationMessage === 'string' ? control.validationMessage : ''
                });

                if (control && typeof control.checkValidity === 'function') {
                    validateControl(control);
                }
            }, true);

            /**
             * getFieldBlock
             * Returns the nearest ancestor field-block element for the
             * given control, or null if none is found.
             * Used to apply/remove the .field-invalid CSS class on the
             * entire field container rather than just the input.
             *
             * @param {HTMLElement} control — the form input/select/textarea
             * @returns {HTMLElement|null}
             */
            function getFieldBlock(control) {
                return control.closest('.textFormFieldBlock, .phoneFormFieldBlock, .dateTimeFormFieldBlock, .lookupFormFieldBlock, .optionSetFormFieldBlock, .passesBlock, .multiOptionSetFormFieldBlock, .twoOptionFormFieldBlock, .consentBlock');
            }

            /**
             * isWhitespaceOnlyInvalid
             * Returns true when a required text-like control contains
             * only whitespace characters, which the browser's built-in
             * 'required' check would otherwise accept.
             * Skips checkbox, radio and file inputs (no trim needed).
             *
             * @param {HTMLElement} control
             * @returns {boolean}
             */
            function isWhitespaceOnlyInvalid(control) {
                const controlType = (control.type || '').toLowerCase();
                const skipTrimTypes = ['checkbox', 'radio', 'file'];

                if (skipTrimTypes.includes(controlType)) {
                    return false;
                }

                return control.required && typeof control.value === 'string' && control.value.trim() === '';
            }

            /**
             * validateControl
             * Validates a single form control, toggling .field-invalid on
             * its block container and setting/removing aria-invalid.
             *
             * @param {HTMLElement} control
             * @returns {boolean} true when the control is valid
             */
            function validateControl(control) {
                const block = getFieldBlock(control);
                const emptyInvalid = isWhitespaceOnlyInvalid(control);
                const invalid = emptyInvalid || !control.checkValidity();

                if (block) {
                    block.classList.toggle('field-invalid', invalid);
                }

                if (invalid) {
                    control.setAttribute('aria-invalid', 'true');
                } else {
                    control.removeAttribute('aria-invalid');
                }

                return !invalid;
            }

            /**
             * validateAllRequiredControls
             * Runs validateControl() on every required field and returns
             * false if any field is invalid.
             *
             * @returns {boolean} true when all required fields are valid
             */
            function validateAllRequiredControls() {
                let allValid = true;

                requiredControls.forEach(function (control) {
                    const controlIsValid = validateControl(control);

                    if (!controlIsValid) {
                        allValid = false;
                    }
                });

                return allValid;
            }

            /**
             * focusFirstInvalidControl
             * Moves keyboard focus to the first required field that is
             * currently marked as aria-invalid="true", giving screen
             * reader users an immediate indication of the error location.
             */
            function focusFirstInvalidControl() {
                const firstInvalidControl = requiredControls.find(function (control) {
                    return control.getAttribute('aria-invalid') === 'true';
                });

                if (firstInvalidControl) {
                    firstInvalidControl.focus();
                }
            }

            /* Preserve a reference to the native HTMLFormElement.submit so
               it can be called after our validation gate passes. */
            const nativeSubmit = HTMLFormElement.prototype.submit;

            /**
             * runSubmissionValidation
             * Central validation gate called both on the 'submit' event
             * and via the overridden form.submit() method.
             * Cancels submission (event.preventDefault) when any required
             * field is invalid and focuses the first offending control.
             *
             * @param {Event|undefined} event — the submit event (optional)
             * @returns {boolean} true when submission is allowed
             */
            function runSubmissionValidation(event) {
                hasSubmitted = true;

                if (!validateAllRequiredControls()) {
                    const firstInvalidControl = requiredControls.find(function (control) {
                        return control.getAttribute('aria-invalid') === 'true';
                    });
                    logger.warn('Submit blocked', {
                        field: firstInvalidControl ? (firstInvalidControl.name || firstInvalidControl.id || 'unknown') : 'unknown'
                    });
                    if (event) {
                        event.preventDefault();
                    }
                    focusFirstInvalidControl();
                    return false;
                }

                logger.success('Submit allowed');

                return true;
            }

            /* Override form.submit() with a hardened version that runs the
               same validation gate as the 'submit' event listener below,
               preventing bypasses via programmatic form.submit() calls. */
            form.submit = function hardenedSubmit() {
                if (!runSubmissionValidation()) {
                    return;
                }

                nativeSubmit.call(form);
            };

            /* Re-validate each required field after a submit attempt so
               error states update live as the user corrects their input. */
            requiredControls.forEach(function (control) {
                /* Re-validate on blur (when the user leaves the field). */
                control.addEventListener('blur', function () {
                    if (hasSubmitted) {
                        validateControl(control);
                    }
                });

                /* Re-validate on input (as the user types). */
                control.addEventListener('input', function () {
                    if (hasSubmitted) {
                        validateControl(control);
                    }
                });
            });

            /* Capture the form's submit event in the capturing phase so
               this handler runs before any other submit listeners. */
            form.addEventListener('submit', function (event) {
                runSubmissionValidation(event);
            }, true);
        })();
    </script>

    <!-- ============================================================
         Name: Division Auto-Populate
         Purpose: Sets the hidden Division lookup/input from the current
         site hostname, then dispatches input/change events so the
         marketing form records the scripted value.
         Source: Inline helper script maintained directly in inquiry.html.
         ============================================================ -->
    <script>
        (function () {
            const logger = window.createFormLogger('Division Auto-Populate');

            var divisionMap = [
                { match: 'simpsongroup.com', division: 'SIMPSON' },
                { match: 'disagroup.com', division: 'DISA' },
                { match: 'disa-india.com', division: 'DISA' },
                { match: 'strikowestofen.com', division: 'StrikoWestofen' },
                { match: 'wheelabratorgroup.com', division: 'Wheelabrator' },
            ];

            function getHostname() {
                return (window.location.hostname || '').toLowerCase().replace(/^www\./, '');
            }

            function setDivisionValue() {
                var hostname = getHostname();
                var match = divisionMap.find(function (entry) {
                    return hostname.indexOf(entry.match) !== -1;
                });

                logger.info('Hostname detected:', hostname);

                if (!match) {
                    logger.info('No division mapping matched.');
                    return;
                }

                var field = document.querySelector('input[name="nor_division"], #d4e0159c-3545-4a36-b374-bb7dcc297dcc');

                if (!field) {
                    logger.warn('nor_division field not found.');
                    return;
                }

                field.value = match.division;
                field.dispatchEvent(new Event('input', { bubbles: true }));
                field.dispatchEvent(new Event('change', { bubbles: true }));

                logger.success('Division set:', {
                    hostname: hostname,
                    division: match.division,
                    fieldId: field.id,
                    fieldName: field.name
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setDivisionValue);
            } else {
                setDivisionValue();
            }
        })();
    </script>

  Purpose: Shared normalization, field discovery, status storage, debug state
  updates and localStorage persistence used by the automation sections.

  debug-state and storage failures.

// logic function
function normalizeText(value) {
  return String(value || '').trim().toLowerCase();
}

// logic function - Returns a normalized, deduplicated set of domains to ignore for website autofill.
function getFreeEmailDomainSet() {
  return new Set(
    [...COMMON_FREE_EMAIL_DOMAINS, ...ADDITIONAL_FREE_EMAIL_DOMAINS]
      .map((item) => normalizeText(item))
      .filter(Boolean)
  );
}

function queryFirst(selectors) {
  for (const selector of selectors || []) {
    const found = document.querySelector(selector);
    if (found) {
      return found;
    }
  }

  return null;
}

function getFieldFromSchema(schemaKey) {
  const previousLogScope = getLogScope();
  setLogScope(LOG_SCOPE.core);
  try {
    const schema = APP_CONFIG.selectors.fieldSchema[schemaKey];
    if (!schema) {
      logWarn('Schema key not found in fieldSchema.', { schemaKey });
      return null;
    }

    const byNames = (schema.names || []).flatMap((name) => [
      `input[name="${name}"]`,
      `textarea[name="${name}"]`,
      `select[name="${name}"]`
    ]);

    const byTitles = (schema.titles || []).flatMap((title) => [
      `input[title="${title}"]`,
      `textarea[title="${title}"]`,
      `select[title="${title}"]`
    ]);

    const byIds = (schema.ids || []).map((id) => `#${id}`);

    const resolved = queryFirst([...byNames, ...byIds, ...byTitles]);
    updateDebugState({
      schemaResolution: {
        ...(window.__IP_DEBUG_STATE__?.schemaResolution || {}),
        [schemaKey]: {
          hasField: !!resolved,
          fieldName: resolved?.getAttribute?.('name') || null,
          fieldId: resolved?.id || null,
          tagName: resolved?.tagName || null
        }
      }
    });

    logDebug('Schema field resolution result.', {
      schemaKey,
      hasField: !!resolved,
      fieldName: resolved?.getAttribute?.('name') || null,
      fieldId: resolved?.id || null,
      tagName: resolved?.tagName || null
    });

    return resolved;
  } finally {
    setLogScope(previousLogScope);
  }
}

const STATUS_DEFAULTS = {

};

function ensureStatusStore() {
  if (!window.__IP_PANEL_STATUS__) {
    window.__IP_PANEL_STATUS__ = {
      [STATUS_KEYS.ip]: { status: STATUS_DEFAULTS[STATUS_KEYS.ip] },
      [STATUS_KEYS.mtm]: { status: STATUS_DEFAULTS[STATUS_KEYS.mtm] },
      [STATUS_KEYS.language]: { status: STATUS_DEFAULTS[STATUS_KEYS.language] },
      [STATUS_KEYS.country]: { status: STATUS_DEFAULTS[STATUS_KEYS.country] }
    };
  }

  return window.__IP_PANEL_STATUS__;
}

function setScriptStatus(key, status, details = {}) {
  const normalized = status === 'Error' ? 'Error' : 'Active';

  try {
    const store = ensureStatusStore();
    if (!store[key]) {
      store[key] = { status: normalized };
    }

    store[key] = {
      ...store[key],
      status: normalized,
      ...details,
      updatedAt: new Date().toISOString()
    };

    window.dispatchEvent(new CustomEvent(PANEL_STATUS_EVENT_NAME, {
      detail: { key, value: store[key] }
    }));
  } catch (error) {
    logDebug('Unable to set script status.', { key, message: error?.message || error });
  }
}

function getScriptStatus(key) {
  const store = ensureStatusStore();
  return store[key]?.status === 'Error' ? 'Error' : 'Active';
}

function setMtmStatus(status, details = {}) {
  setScriptStatus(STATUS_KEYS.mtm, status, details);
}

  Purpose: Captures MTM attribution, referrer, entry URL and submission URL
  values, then writes them into hidden marketing fields.
  Error logging: Uses Form Automation / MTM Field Population for missing
  fields, incomplete attribution, iframe access issues and write failures.
  ========================= */



(function () {
  // ========== Badge & Text Styles ==========
  const LOG_PREFIX  = LOG_SCOPE.mtm;
  const mtmLogInfo    = (...m) => console.log(`%c[${LOG_PREFIX}]`, LOG_STYLES.info, ...m);
  const mtmLogSuccess = (...m) => console.log(`%c[${LOG_PREFIX}]`, LOG_STYLES.success, ...m);
  const mtmLogWarn    = (...m) => console.warn(`%c[${LOG_PREFIX}]`, LOG_STYLES.warn, ...m);
  const mtmLogError   = (...m) => console.error(`%c[${LOG_PREFIX}]`, LOG_STYLES.error, ...m);
  const groupStart = (label, collapsed = false) => {
    const header = `%c[${LOG_PREFIX}] ${String(label)}`;
    const fn = collapsed ? console.groupCollapsed : console.group;
    fn(header, LOG_STYLES.info);
  };
  const groupEnd = () => { try { console.groupEnd(); } catch (_) {} };

  setMtmStatus('Active', { source: 'mtm-script-init' });
  // ---- Config: field titles and corresponding parameter keys ----
  const FIELD_MAP = [
    { title: "MTM Source",   key: "mtm_source"   },
    { title: "MTM Medium",   key: "mtm_medium"   },
    { title: "MTM Campaign", key: "mtm_campaign" },
    { title: "MTM Content",  key: "mtm_content"  },
    { title: "MTM Term",     key: "mtm_term"     }
  ];
  const REFERRER_URL_FIELD_TITLE = "Referrer URL";
  const ENTRY_URL_FIELD_TITLE = "Entry URL";
  const SUBMISSION_URL_FIELD_TITLES = ["Submission URL", "Form Submission URL", "Submit URL"];

  // ---------- Utilities ----------
  function norm(s) {
    return (s || "").replace(/\s+/g, " ").trim().toLowerCase();
  }

  function findFieldByTitle(rootDoc, labelText) {
    const target = norm(labelText);
    // 1) aria-label exact
    let el = rootDoc.querySelector(`input[aria-label="${labelText}"], textarea[aria-label="${labelText}"], select[aria-label="${labelText}"]`);
    if (el) return el;
    // 2) label text exact → via for/id or nearby container
    const labels = Array.from(rootDoc.querySelectorAll("label"));
    for (const lab of labels) {
      if (norm(lab.textContent) === target) {
        const forId = lab.getAttribute("for");
        if (forId) {
          const byFor = rootDoc.getElementById(forId);
          if (byFor) return byFor;
        }
        const nearby = lab.closest("[data-editor-container], .field, .control, div")?.querySelector("input, textarea, select");
        if (nearby) return nearby;
      }
    }
    // 3) title/placeholder exact
    el = rootDoc.querySelector(
      `input[title="${labelText}"], textarea[title="${labelText}"], select[title="${labelText}"],` +
      `input[placeholder="${labelText}"], textarea[placeholder="${labelText}"]`
    );
    if (el) return el;
    // 4) contains fallback
    el = rootDoc.querySelector(
      `input[aria-label*="${labelText}"], textarea[aria-label*="${labelText}"], select[aria-label*="${labelText}"],` +
      `input[title*="${labelText}"], textarea[title*="${labelText}"],` +
      `input[placeholder*="${labelText}"], textarea[placeholder*="${labelText}"]`
    );
    return el || null;
  }

  function sanitizeUrl(rawUrl) {
    const externalSanitizer = window.SiteAttribution && typeof window.SiteAttribution.sanitizeUrl === 'function'
      ? window.SiteAttribution.sanitizeUrl
      : null;

    if (externalSanitizer) {
      return externalSanitizer(rawUrl);
    }

    try {
      const parsed = new URL(rawUrl, window.location.origin);
      return `${parsed.origin}${parsed.pathname}`;
    } catch (_) {
      return '';
    }
  }

  function setFieldValue(field, value) {
    field.value = value;
    field.dispatchEvent(new Event('input',  { bubbles: true }));
    field.dispatchEvent(new Event('change', { bubbles: true }));
  }

  function setSubmitButtonTextFromMtmTerm(rootDoc, mtmData) {
    const buttonTextRaw = String(mtmData?.mtm_term || '').trim();
    const buttonText = buttonTextRaw
      .replace(/\s+/g, ' ')
      .replace(/([a-z0-9])([A-Z])/g, '$1 $2');

    if (!buttonText) {
      mtmLogInfo('No mtm_term value found. Submit button text unchanged.');
      return false;
    }

    const submitButton = rootDoc.querySelector(
      'button.submitButton[type="submit"], button.primaryButton[type="submit"], button[type="submit"]'
    );

    if (!submitButton) {
      mtmLogWarn('Submit button not found. Unable to apply mtm_term as button text.');
      return false;
    }

    const textContainer = submitButton.querySelector('span') || submitButton;
    textContainer.textContent = buttonText;
    mtmLogSuccess(`Set submit button text to '${buttonText}' from mtm_term.`);
    return true;
  }

  function getFallbackAttribution() {
    const params = new URLSearchParams(window.location.search || '');
    const mtm = {};

    params.forEach((value, key) => {
      const normalized = key.toLowerCase();
      if (normalized.startsWith('mtm_') && value !== '') {
        mtm[normalized] = value;
      }
    });

    return {
      mtm,
      entryUrl: sanitizeUrl(window.location.href),
      referrerUrl: sanitizeUrl(document.referrer || ''),
      browserLanguage: navigator.language || ''
    };
  }

  function getAttributionPayload() {
    if (window.SiteAttribution && typeof window.SiteAttribution.get === 'function') {
      const stored = window.SiteAttribution.get();
      if (stored) {
        return stored;
      }
    }

    return getFallbackAttribution();
  }

  function populateMTMFields(rootDoc) {
    groupStart("Populate MTM Fields");
    setMtmStatus('Active', { source: 'mtm-populate-start' });

    try {
      const payload = getAttributionPayload();
      const mtmData = payload?.mtm || {};
      const referrerUrl = sanitizeUrl(payload?.referrerUrl || '');
      const entryUrl = sanitizeUrl(payload?.entryUrl || window.location.href);

      mtmLogInfo('Resolved attribution payload.', {
        hasMtmData: Object.keys(mtmData).length > 0,
        referrerUrl,
        entryUrl
      });

      let attempt = 0;
      const maxAttempts = 5;
      const delayMs = 250;

      const tryFill = () => {
        attempt++;
        let filledCount = 0;
        let targetCount = FIELD_MAP.length + 2;

        groupStart(`Attempt ${attempt}/${maxAttempts}`, true);

        // Fill MTM fields with value only (no key prefix)
        for (const { title, key } of FIELD_MAP) {
          const rawValue = mtmData[key] || '';
          const value = rawValue;
          const field = findFieldByTitle(rootDoc, title);
          if (!field) {
            mtmLogWarn(`Field '${title}' not found on attempt ${attempt}.`);
            continue;
          }

          setFieldValue(field, value);
          mtmLogSuccess(`Set '${title}' to '${value}'.`);
          filledCount++;
        }

        // Fill sanitized Referrer URL
        const refField = findFieldByTitle(rootDoc, REFERRER_URL_FIELD_TITLE);
        if (refField) {
          setFieldValue(refField, referrerUrl);
          mtmLogSuccess(`Set '${REFERRER_URL_FIELD_TITLE}' to sanitized URL.`);
          filledCount++;
        } else {
          mtmLogWarn(`Field '${REFERRER_URL_FIELD_TITLE}' not found on attempt ${attempt}.`);
          targetCount--;
        }

        // Fill sanitized Entry URL when field exists
        const entryField = findFieldByTitle(rootDoc, ENTRY_URL_FIELD_TITLE);
        if (entryField) {
          setFieldValue(entryField, entryUrl);
          mtmLogSuccess(`Set '${ENTRY_URL_FIELD_TITLE}' to sanitized URL.`);
          filledCount++;
        } else {
          mtmLogWarn(`Field '${ENTRY_URL_FIELD_TITLE}' not found on attempt ${attempt}.`);
          targetCount--;
        }

        setSubmitButtonTextFromMtmTerm(rootDoc, mtmData);

        groupEnd(); // end Attempt

        if (filledCount === targetCount) {
          mtmLogSuccess('All attribution fields populated successfully.');
          setMtmStatus('Active', {
            source: 'mtm-populate-success',
            filledCount,
            totalTargets: targetCount,
            attempt
          });
          groupEnd(); // end Populate MTM Fields
        } else if (attempt < maxAttempts) {
          mtmLogWarn(`Populated ${filledCount}/${targetCount} field(s). Retrying...`);
          setTimeout(tryFill, delayMs);
        } else {
          mtmLogError(`Completed ${filledCount}/${targetCount} after ${maxAttempts} attempts. Some fields not found.`);
          setMtmStatus('Error', {
            source: 'mtm-populate-incomplete',
            filledCount,
            totalTargets: targetCount,
            attempt
          });
          groupEnd(); // end Populate MTM Fields
        }
      };
      tryFill();
    } catch (e) {
      mtmLogError("Unhandled error while populating MTM fields:", e.message || e);
      setMtmStatus('Error', {
        source: 'mtm-populate-exception',
        message: e?.message || String(e)
      });
      groupEnd();
    }
  }

  function bindSubmissionUrlCapture(rootDoc) {
    const form = rootDoc.querySelector('form');
    if (!form) {
      mtmLogWarn('No form found to bind submission URL capture.');
      return;
    }

    if (form.dataset.submissionUrlCaptureBound === 'true') {
      return;
    }

    const writeSubmissionUrl = () => {
      const submitUrlValue = sanitizeUrl(window.location.href);
      let didWrite = false;

      for (const title of SUBMISSION_URL_FIELD_TITLES) {
        const field = findFieldByTitle(rootDoc, title);
        if (!field) {
          continue;
        }

        setFieldValue(field, submitUrlValue);
        didWrite = true;
        mtmLogSuccess(`Set '${title}' to sanitized submit URL.`);
      }

      if (!didWrite) {
        mtmLogWarn('Submission URL field not found. Add a field titled Submission URL, Form Submission URL, or Submit URL.');
      }

      return didWrite;
    };

    const handler = () => {
      writeSubmissionUrl();
    };

    // Populate as soon as the form is available so the field is filled on entry.
    writeSubmissionUrl();

    // Retry briefly for late-rendered form fields.
    let retryCount = 0;
    const maxRetries = 4;
    const retryTimer = window.setInterval(() => {
      retryCount += 1;
      const didWrite = writeSubmissionUrl();
      if (didWrite || retryCount >= maxRetries) {
        window.clearInterval(retryTimer);
      }
    }, 250);

    form.addEventListener('submit', handler, true);
    form.dataset.submissionUrlCaptureBound = 'true';
    mtmLogInfo('Bound submit URL capture listener.');
  }

  // ---- Event hookup ----
  let mtmPopulateTriggered = false;
  function runPopulateOnce(source) {
    if (mtmPopulateTriggered) {
      mtmLogInfo(`Skipping duplicate MTM population trigger from '${source}'.`);
      return;
    }

    mtmPopulateTriggered = true;
    mtmLogInfo(`Running MTM population from trigger '${source}'.`);
    populateMTMFields(document);
    bindSubmissionUrlCapture(document);
  }

  document.addEventListener("d365mkt-afterformload", function () {
    runPopulateOnce('d365mkt-afterformload');
    // If your Marketing form is embedded in an iframe, enable this block:
    /*
    const frm = document.querySelector('iframe[src*="mktform"], iframe[src*="forms.dynamics.com"], iframe[data-test-id="marketing-form"]');
    if (frm && frm.contentDocument) {
      populateMTMFields(frm.contentDocument);
    } else {
      mtmLogWarn("Marketing form iframe not detected; proceeding with main document only.");
    }
    */
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      runPopulateOnce('DOMContentLoaded fallback');
    });
  } else {
    runPopulateOnce('immediate fallback');
  }
})();

  Purpose: Detects browser language, initializes i18next and translates

// Reads browser-preferred language(s), normalized to BCP-47-like tags (e.g. en-us).
function getPreferredBrowserLanguage() {
  const previousLogScope = getLogScope();
  setLogScope(LOG_SCOPE.ui);
  try {
    const list = Array.isArray(navigator.languages) && navigator.languages.length > 0
      ? navigator.languages
      : [navigator.language || navigator.userLanguage || 'en-US'];

    const normalized = list
      .map((item) => normalizeText(item).replace('_', '-'))
      .filter(Boolean);

    const chosen = normalized[0] || 'en-us';
    logInfo('Detected browser languages:', normalized);
    return chosen;
  } finally {
    setLogScope(previousLogScope);
  }
}

let activeUiLanguage = 'en';
let uiTranslationInitPromise = null;
const UI_LANGUAGE_STORAGE_KEY = APP_CONFIG.storage.uiLanguageOverrideKey;
const DEBUG_PANEL_STORAGE_KEY = 'crm_debug';

function getStoredUiLanguageOverride() {
  try {
    return localStorage.getItem(UI_LANGUAGE_STORAGE_KEY);
  } catch (error) {
    logDebug('Unable to read UI language override from localStorage.', error?.message || error);
    return null;
  }
}

function setStoredUiLanguageOverride(language) {
  try {
    localStorage.setItem(UI_LANGUAGE_STORAGE_KEY, language);
  } catch (error) {
    logDebug('Unable to persist UI language override to localStorage.', error?.message || error);
  }
}

function logLanguageDiagnostics(details) {
  const payload = {
    browserLanguage: navigator.language || null,
    browserLanguages: Array.isArray(navigator.languages) ? navigator.languages : [],
    ...details
  };

  logInfo('UI language diagnostics:', payload);
}

function getNestedValue(root, path) {
  return path.split('.').reduce((acc, segment) => {
    if (acc && Object.prototype.hasOwnProperty.call(acc, segment)) {
      return acc[segment];
    }
    return undefined;
  }, root);
}

function normalizeUiPhrase(value) {
  return String(value || '')
    .replace(/\u00a0/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

// logic function
function getSupportedUiLanguage(tag) {
  const normalized = normalizeText(tag).replace('_', '-');
  if (normalized === 'zh' || normalized.startsWith('zh-')) {
    return 'zh';
  }

  if (normalized === 'de' || normalized.startsWith('de-')) {
    return 'de';
  }

  if (normalized === 'en' || normalized.startsWith('en-')) {
    return 'en';
  }

  return 'en';
}

function getInitialUiLanguage() {
  const stored = getStoredUiLanguageOverride();
  const supportedStored = getSupportedUiLanguage(stored || '');
  if (stored && supportedStored) {
    logLanguageDiagnostics({ source: 'stored override', stored, resolved: supportedStored });
    return supportedStored;
  }

  const browserTag = getPreferredBrowserLanguage();
  const resolved = getSupportedUiLanguage(browserTag);
  logLanguageDiagnostics({ source: 'browser', browserTag, resolved });
  return resolved;
}

function tUi(key) {
  if (window.i18next && window.i18next.isInitialized) {
    return window.i18next.t(key);
  }

  return getNestedValue(UI_TRANSLATION_RESOURCES[activeUiLanguage]?.translation, key)
    || getNestedValue(UI_TRANSLATION_RESOURCES.en.translation, key)
    || key;
}

function setLabelVisibleText(label, translatedText) {
  if (!label) {
    return;
  }

  const requiredSuffix = label.querySelector('.requiredSuffix');
  if (requiredSuffix) {
    requiredSuffix.textContent = tUi('common.requiredSuffix');

    const container = requiredSuffix.parentElement && requiredSuffix.parentElement !== label
      ? requiredSuffix.parentElement
      : label;

    const previousElement = requiredSuffix.previousElementSibling;
    if (previousElement) {
      previousElement.textContent = translatedText;
      return;
    }

    const suffixIndex = Array.from(container.childNodes).indexOf(requiredSuffix);
    const textNode = Array.from(container.childNodes).find((node, index) =>
      index < suffixIndex
      && node.nodeType === Node.TEXT_NODE
      && String(node.nodeValue || '').replace(/\u00a0/g, '').trim() !== ''
    );

    if (textNode) {
      textNode.nodeValue = `${translatedText} `;
    } else {
      container.insertBefore(document.createTextNode(`${translatedText} `), requiredSuffix);
    }
    return;
  }

  const hasRequiredTextSuffix = /\*\s*$/.test(String(label.textContent || '').replace(/\u00a0/g, ' '));
  label.textContent = hasRequiredTextSuffix ? `${translatedText} ${tUi('common.requiredSuffix')}` : translatedText;
}

function findOrTrackElementByText(key, englishText, selector) {
  const tracked = document.querySelector(`[data-ip-i18n-key="${key}"]`);
  if (tracked) {
    return tracked;
  }

  const expected = normalizeUiPhrase(englishText);
  const pool = Array.from(document.querySelectorAll(selector || 'h1, h2, h3, h4, h5, h6, p, span, label, button'));
  const match = pool.find((item) => normalizeUiPhrase(item.textContent) === expected);
  if (match) {
    match.setAttribute('data-ip-i18n-key', key);
  }

  return match || null;
}

function setTrackedText(key, englishText, translatedText, selector) {
  const element = findOrTrackElementByText(key, englishText, selector);
  if (element) {
    element.textContent = translatedText;
  }
}

function getTranslationBoundaryElement() {
  return Array.from(document.querySelectorAll('span, p')).find((element) =>
    normalizeUiPhrase(element.textContent).startsWith('i agree and understand that by completing this form')
  ) || null;
}

function isBeforeTranslationBoundary(element) {
  const boundary = getTranslationBoundaryElement();
  if (!boundary || !element) {
    return true;
  }

  return !!(element.compareDocumentPosition(boundary) & Node.DOCUMENT_POSITION_FOLLOWING);
}

function applyPlaceholderBySchema(schemaKey, key) {
  const field = getFieldFromSchema(schemaKey);
  if (!field || !field.matches('input, textarea')) {
    return;
  }

  if (!isBeforeTranslationBoundary(field)) {
    logDebug('Skipping placeholder translation below privacy notice.', { schemaKey });
    return;
  }

  field.setAttribute('data-ip-i18n-placeholder-key', key);
  field.setAttribute('placeholder', tUi(key));
}

function applyTitleBySchema(schemaKey, key) {

function applySelectDefaultOptionTranslation() {
  const defaultText = tUi('options.selectDefault');
  const selects = Array.from(document.querySelectorAll('select'));

	      const text = normalizeUiPhrase(item.textContent || '');
      return text === '- select';

  });

function applyFieldTranslation(schemaKey, labelKey) {
  const field = getFieldFromSchema(schemaKey);

  if (!field) {
    logDebug('Translation target field not found.', { schemaKey });
    return;
  }

  if (!isBeforeTranslationBoundary(field)) {
    logDebug('Skipping label translation below privacy notice.', { schemaKey });
    return;
  }

  const translatedLabel = tUi(labelKey);
  field.setAttribute('data-ip-i18n-label-key', labelKey);

  const labels = Array.from(document.querySelectorAll('label'));
  const schema = APP_CONFIG.selectors.fieldSchema[schemaKey] || {};
  const label = (field.id
    ? labels.find((item) => item.getAttribute('for') === field.id)
    : null)
    || labels.find((item) => (schema.titles || []).some((title) => normalizeText(item.getAttribute('title')) === normalizeText(title)))
    || labels.find((item) => normalizeText(item.textContent).replace(/\s*\*$/, '') === normalizeText(tUi(labelKey)));

  if (label) {
    label.setAttribute('data-ip-i18n-key', labelKey);
    setLabelVisibleText(label, translatedLabel);
  }
}

async function initializeUiTranslations() {
  setLogScope(LOG_SCOPE.ui);
  activeUiLanguage = getInitialUiLanguage();

  if (!window.i18next || typeof window.i18next.init !== 'function') {
    logWarn('i18next is not available; continuing with fallback label translations.', { activeUiLanguage });
    applyUiFieldTranslations();
    ensureLanguagePanel();
    return;
  }

  if (!window.i18next.isInitialized) {
    await window.i18next.init({
      resources: UI_TRANSLATION_RESOURCES,
      lng: activeUiLanguage,
      fallbackLng: 'en',
      interpolation: { escapeValue: false }
    });
  } else {
    await window.i18next.changeLanguage(activeUiLanguage);
  }

  applyUiFieldTranslations();
  ensureLanguagePanel();
  logSuccess('Applied UI label/title translations.', { activeUiLanguage });
}

function ensureUiTranslationsInitialized() {
  if (!uiTranslationInitPromise) {
    uiTranslationInitPromise = initializeUiTranslations();
  }

  return uiTranslationInitPromise;
}

/* =========================
  Name: Tracking & Profile Persistence
  Purpose: Resolves form fields, restores UTM/campaign values from
  localStorage and persists website, industry and company profile values.
  Error logging: Uses Form Automation / Tracking & Profile Persistence for
  missing tracking fields, localStorage failures, retry exhaustion and
  campaign lookup fallback issues.
  ========================= */
// Looks for element id in main document and same-origin iframes.
function getByIdAcrossDocuments(id) {
  if (!id) {
    return null;
  }

  const direct = document.getElementById(id);
  if (direct) {
    return direct;
  }

  for (const frame of Array.from(document.querySelectorAll('iframe'))) {
    try {
      const frameDoc = frame.contentDocument;
      if (!frameDoc) {
        continue;
      }

      const inFrame = frameDoc.getElementById(id);
      if (inFrame) {
        return inFrame;
      }
    } catch (error) {
      logDebug('Skipping iframe lookup due to access restriction.', error?.message || error);
    }
  }

  return null;
}

// Finds a field by label text, prioritizing label[for] and then nearby input/select fallback.
function getFieldByLabelText(labelText) {
  const expected = normalizeText(labelText);
  const labels = Array.from(document.querySelectorAll('label'));
  const label = labels.find((item) => normalizeText(item.textContent) === expected);

  if (!label) {
    return null;
  }

  const forId = label.getAttribute('for');
  if (forId) {
    const byFor = getByIdAcrossDocuments(forId);
    if (byFor) {
      return byFor;
    }
  }

  return label.closest('div')?.querySelector('input, textarea, select')
    || label.parentElement?.querySelector('input, textarea, select')
    || null;
}

function populateUtmField() {
  setLogScope(LOG_SCOPE.profile);
  const utmValue = getStoredUtmValue();
  if (!utmValue) {
    logInfo('No crm_utm value found in localStorage; skipping UTM field population.');
    return true;
  }

  const utmField = getUtmField();
  if (!utmField) {
    logWarn('UTM field not found yet; retrying later.', {
      storageKey: 'crm_utm'
    });
    return false;
  }

  if (utmField.value !== utmValue) {
    utmField.value = utmValue;
    dispatchChangeEvents(utmField);
    logSuccess('Populated UTM field from localStorage crm_utm.', {
      valueLength: utmValue.length
    });
    return true;
  }

  logInfo('UTM field already matches localStorage value; no update needed.');
  return true;
}

    value: String(field?.value || '').trim(),
    source: 'hidden MTM Campaign field'
  };
}

function resolveCampaignLookupValue() {
  setLogScope(LOG_SCOPE.profile);
  const candidates = [
    getStoredCampaignValue(),
    getSiteAttributionCampaignValue(),
    getUrlCampaignValue(),
    getHiddenMtmCampaignFieldValue()
  ];

  const selected = candidates.find((candidate) => candidate.value);
  if (!selected) {
    logInfo('No campaign lookup value found from any configured source.', {
      sourcesChecked: candidates.map((candidate) => candidate.source)
    });
    return { value: '', source: null };
  }

  logInfo('Campaign lookup value resolved.', {
    source: selected.source,
    valueLength: selected.value.length
  });

  if (selected.source !== 'crm_campaign') {
    persistCapturedMetaValue('crm_campaign', selected.value, `campaign-fallback-${selected.source}`);
  }

  return selected;
}

async function populateCampaignLookupField() {
  setLogScope(LOG_SCOPE.profile);
  const campaignCandidate = resolveCampaignLookupValue();
  const campaignValue = campaignCandidate.value;
  const campaignSource = campaignCandidate.source;
  if (!campaignValue) {
    logInfo('Campaign lookup skipped: no usable campaign value found.');
    return true;
  }

  const campaignField = getCampaignField();
  if (!campaignField) {
    logWarn('Campaign lookup field not found yet; retrying later.', {
      storageKey: 'crm_campaign'
    });
    return false;
  }

  const form = campaignField.closest('form') || document.querySelector('form');
  const logicalName = campaignField.getAttribute('name')
    || campaignField.getAttribute('data-targetproperty')
    || campaignField.id
    || 'campaignid';
  const fieldWindow = campaignField.ownerDocument?.defaultView || window;
  const d365 = fieldWindow?.d365mktforms || window.d365mktforms;

  if (form && logicalName && d365 && typeof d365.fillLookupFromSearch === 'function') {
    try {
      await d365.fillLookupFromSearch(form, logicalName, campaignValue);
      persistCapturedMetaValue('crm_campaign', campaignValue, 'campaign-d365-fillLookupFromSearch');
      logSuccess('Campaign lookup field populated via d365mktforms.fillLookupFromSearch.', {
        logicalName,
        campaignValue,
        campaignSource
      });
      return true;
    } catch (error) {
      logWarn('Campaign lookup API population failed; attempting direct input fallback.', {
        logicalName,
        campaignValue,
        campaignSource,
        message: error?.message || error
      });
    }
  } else {
    logWarn('Campaign lookup API unavailable; attempting direct input fallback.', {
      hasForm: !!form,
      logicalName: logicalName || null,
      hasD365Api: !!d365,
      hasFillLookupFromSearch: !!(d365 && typeof d365.fillLookupFromSearch === 'function'),
      campaignSource
    });
  }

  if (campaignField.value !== campaignValue) {
    campaignField.value = campaignValue;
    dispatchChangeEvents(campaignField);
    persistCapturedMetaValue('crm_campaign', campaignValue, 'campaign-direct-input');
    logSuccess('Campaign lookup direct-input fallback used.', {
      campaignValue,
      campaignSource
    });
    return true;
  }

  logInfo('Campaign lookup field already matches resolved value; no update needed.', {
    campaignSource
  });
  return true;
}

/* =========================
  Name: Email to Website Sync
  Purpose: Derives the company website from the email domain, ignores common
  free email providers and stores the generated website value.
  Error logging: Uses Form Automation / Email to Website Sync for missing
  email/website fields, invalid email domains and listener retry failures.
  ========================= */
// logic function - Extracts the domain part from an email address. Returns null when invalid/incomplete.
function extractDomainFromEmail(emailValue) {
  const email = String(emailValue || '').trim().toLowerCase();
  const atIndex = email.lastIndexOf('@');
  if (atIndex <= 0 || atIndex === email.length - 1) {
    return null;
  }

  const domain = email.slice(atIndex + 1).trim();
  if (!domain || !domain.includes('.')) {
    return null;
  }

  return domain;
}

// logic function
function getWebsiteFromDomain(domain) {
  return `https://${domain}`;
}

// Computes and writes website URL from email domain unless email uses a free provider.
function syncWebsiteFromEmail() {
  setLogScope(LOG_SCOPE.emailWebsite);
  const emailField = getEmailField();
  const websiteField = getWebsiteFieldInput();

  if (!emailField || !websiteField) {
    logWarn('Email/Website sync skipped: missing email or website field.', {
      hasEmailField: !!emailField,
      hasWebsiteField: !!websiteField
    });
    return false;
  }

  const domain = extractDomainFromEmail(emailField.value);
  if (!domain) {
    logInfo('Email/Website sync skipped: email value has no valid domain yet.');
    return false;
  }

  const freeDomains = getFreeEmailDomainSet();
  if (freeDomains.has(domain)) {
    logInfo('Email/Website sync skipped: free email provider domain.', { domain });
    return false;
  }

  const nextWebsite = getWebsiteFromDomain(domain);
  if (websiteField.value !== nextWebsite) {
    websiteField.value = nextWebsite;
    dispatchChangeEvents(websiteField);
    persistCapturedMetaValue('crm_website', nextWebsite, 'email-domain-sync');
    logSuccess('Website auto-populated from email domain.', { domain, website: nextWebsite });
    return true;
  }

  persistCapturedMetaValue('crm_website', nextWebsite, 'email-domain-sync-noop');
  logInfo('Website already matches email domain; no update needed.', { domain });
  return true;
}

function persistFormFieldValue(field, storageKey, source) {
  const value = String(field?.value || '').trim();
  if (!value) {
    return false;
  }

  return persistCapturedMetaValue(storageKey, value, source);
}

function bindFormFieldPersistence(field, storageKey, source) {
  if (!field) {
    return false;
  }

  const bindKey = `${storageKey}Bound`;
  if (field.dataset[bindKey] === 'true') {
    return true;
  }

  const handler = () => {
    persistFormFieldValue(field, storageKey, source);
  };

  field.addEventListener('input', handler);
  field.addEventListener('change', handler);
  field.dataset[bindKey] = 'true';
  handler();
  return true;
}

function bindFormProfilePersistence() {
  setLogScope(LOG_SCOPE.profile);

  const industryBound = bindFormFieldPersistence(industryField, 'crm_industry', 'form-field-listener');
